<h2>设置页面</h2>
<p class="subtitle">分类管理 + 导出</p>

<div class="mockup" style="max-width: 380px; margin: 0 auto;">
  <div class="mockup-header">⚙️ 设置</div>
  <div class="mockup-body" style="padding: 16px;">

    <!-- 分类管理 -->
    <div class="section" style="border: 1px solid #e0e0e0; border-radius: 10px; padding: 12px;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
        <span class="label" style="margin: 0;">📂 分类管理</span>
        <span style="color: #4CAF50; font-weight: bold; font-size: 22px; line-height: 1;">＋</span>
      </div>

      <div style="border: 1px solid #f0f0f0; border-radius: 8px; padding: 8px;">
        <!-- 一级类别 -->
        <div style="display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid #f5f5f5;">
          <div>
            <span style="font-weight: bold;">🍜 餐饮</span>
            <span style="font-size: 12px; color: #999; margin-left: 8px;">午餐 · 晚餐 · 早餐 · 饮料零食</span>
          </div>
          <div style="display: flex; gap: 8px;">
            <span style="font-size: 12px; color: #666;">✎</span>
            <span style="font-size: 12px; color: #e53935;">✕</span>
          </div>
        </div>
        <div style="display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid #f5f5f5;">
          <div>
            <span style="font-weight: bold;">🚗 交通</span>
            <span style="font-size: 12px; color: #999; margin-left: 8px;">打车 · 公交 · 加油 · 停车</span>
          </div>
          <div style="display: flex; gap: 8px;">
            <span style="font-size: 12px; color: #666;">✎</span>
            <span style="font-size: 12px; color: #e53935;">✕</span>
          </div>
        </div>
        <div style="display: flex; justify-content: space-between; align-items: center; padding: 6px 0;">
          <div>
            <span style="font-weight: bold;">🛒 购物</span>
            <span style="font-size: 12px; color: #999; margin-left: 8px;">日用品 · 服装 · 数码 · 其他</span>
          </div>
          <div style="display: flex; gap: 8px;">
            <span style="font-size: 12px; color: #666;">✎</span>
            <span style="font-size: 12px; color: #e53935;">✕</span>
          </div>
        </div>
      </div>
    </div>

    <!-- 导出数据 -->
    <div class="section" style="border: 1px solid #e0e0e0; border-radius: 10px; padding: 12px; margin-top: 12px;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
        <span class="label" style="margin: 0;">📤 导出数据</span>
      </div>

      <div style="background: #f5f5f5; border-radius: 8px; padding: 12px;">
        <div style="margin-bottom: 8px;">
          <label><input type="checkbox" checked> 包含截图</label>
          <div style="font-size: 11px; color: #999; margin-left: 20px;">导出为 ZIP（CSV + 图片文件夹）</div>
        </div>
        <button class="mock-button" style="width: 100%; background: #4CAF50; color: white; padding: 10px; border: none; border-radius: 8px; font-size: 14px;">📥 导出</button>
      </div>
    </div>

    <!-- 导入数据 -->
    <div class="section" style="border: 1px solid #e0e0e0; border-radius: 10px; padding: 12px; margin-top: 12px;">
      <div class="label" style="margin-bottom: 8px;">📥 导入数据</div>
      <div style="background: #fff8e1; border-radius: 8px; padding: 12px; text-align: center; border: 1px dashed #ffa000;">
        <div style="font-size: 13px; color: #e65100;">选择之前导出的 ZIP 文件恢复数据</div>
        <button class="mock-button" style="width: 100%; background: #FF9800; color: white; padding: 10px; border: none; border-radius: 8px; font-size: 14px; margin-top: 8px;">📂 选择文件导入</button>
      </div>
    </div>

  </div>
</div>
