<h2>设置页面</h2>
<p class="subtitle">分类管理 → 统一大表管理</p>

<div class="mockup" style="max-width: 420px; margin: 0 auto;">
  <div class="mockup-header">⚙️ 设置</div>
  <div class="mockup-body" style="padding: 16px;">

    <!-- 分类管理 - 大表 -->
    <div class="section" style="border: 1px solid #e0e0e0; border-radius: 10px; padding: 12px;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
        <span class="label" style="margin: 0;">📂 分类管理 <span style="font-size: 12px; color: #999; font-weight: normal;">（共 19 个类别）</span></span>
        <span style="color: #4CAF50; font-weight: bold; font-size: 22px; line-height: 1;">＋</span>
      </div>

      <!-- 表头 -->
      <div style="display: flex; background: #f5f5f5; padding: 8px; border-radius: 6px; font-size: 12px; font-weight: bold; color: #666; margin-bottom: 4px;">
        <div style="width: 48px;">图标</div>
        <div style="flex: 1;">名称</div>
        <div style="width: 80px;">类型</div>
        <div style="width: 60px; text-align: center;">操作</div>
      </div>

      <!-- 数据行 -->
      <div style="max-height: 280px; overflow-y: auto;">

        <div style="display: flex; align-items: center; padding: 8px; border-bottom: 1px solid #f0f0f0;">
          <div style="width: 48px;">🍜</div>
          <div style="flex: 1; font-weight: bold;">餐饮</div>
          <div style="width: 80px; font-size: 12px; color: #4CAF50;">一级</div>
          <div style="width: 60px; text-align: center; font-size: 12px; color: #666;">✎ ✕</div>
        </div>
        <div style="display: flex; align-items: center; padding: 8px; border-bottom: 1px solid #f0f0f0; background: #fafafa;">
          <div style="width: 48px; padding-left: 12px;">🍳</div>
          <div style="flex: 1;">&nbsp;&nbsp;&nbsp;早餐</div>
          <div style="width: 80px; font-size: 12px; color: #999;">子类别</div>
          <div style="width: 60px; text-align: center; font-size: 12px; color: #666;">✎ ✕</div>
        </div>
        <div style="display: flex; align-items: center; padding: 8px; border-bottom: 1px solid #f0f0f0; background: #fafafa;">
          <div style="width: 48px; padding-left: 12px;">🍚</div>
          <div style="flex: 1;">&nbsp;&nbsp;&nbsp;午餐</div>
          <div style="width: 80px; font-size: 12px; color: #999;">子类别</div>
          <div style="width: 60px; text-align: center; font-size: 12px; color: #666;">✎ ✕</div>
        </div>
        <div style="display: flex; align-items: center; padding: 8px; border-bottom: 1px solid #f0f0f0; background: #fafafa;">
          <div style="width: 48px; padding-left: 12px;">🍜</div>
          <div style="flex: 1;">&nbsp;&nbsp;&nbsp;晚餐</div>
          <div style="width: 80px; font-size: 12px; color: #999;">子类别</div>
          <div style="width: 60px; text-align: center; font-size: 12px; color: #666;">✎ ✕</div>
        </div>

        <div style="display: flex; align-items: center; padding: 8px; border-bottom: 1px solid #f0f0f0;">
          <div style="width: 48px;">🚗</div>
          <div style="flex: 1; font-weight: bold;">交通</div>
          <div style="width: 80px; font-size: 12px; color: #4CAF50;">一级</div>
          <div style="width: 60px; text-align: center; font-size: 12px; color: #666;">✎ ✕</div>
        </div>
        <div style="display: flex; align-items: center; padding: 8px; border-bottom: 1px solid #f0f0f0; background: #fafafa;">
          <div style="width: 48px; padding-left: 12px;">🚕</div>
          <div style="flex: 1;">&nbsp;&nbsp;&nbsp;打车</div>
          <div style="width: 80px; font-size: 12px; color: #999;">子类别</div>
          <div style="width: 60px; text-align: center; font-size: 12px; color: #666;">✎ ✕</div>
        </div>

        <div style="display: flex; align-items: center; padding: 8px;">
          <div style="width: 48px;">🔄</div>
          <div style="flex: 1; font-weight: bold;">报销</div>
          <div style="width: 80px; font-size: 12px; color: #4CAF50;">一级</div>
          <div style="width: 60px; text-align: center; font-size: 12px; color: #666;">✎ ✕</div>
        </div>

      </div>
    </div>

    <!-- 导出 / 导入 保持不变 -->
    <div class="section" style="border: 1px solid #e0e0e0; border-radius: 10px; padding: 12px; margin-top: 12px;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
        <span class="label" style="margin: 0;">📤 导出数据</span>
      </div>
      <div style="background: #f5f5f5; border-radius: 8px; padding: 12px;">
        <label><input type="checkbox" checked> 包含截图（导出为 ZIP）</label>
        <button class="mock-button" style="width: 100%; background: #4CAF50; color: white; padding: 10px; border: none; border-radius: 8px; font-size: 14px; margin-top: 8px;">📥 导出</button>
      </div>
    </div>

    <div class="section" style="border: 1px solid #e0e0e0; border-radius: 10px; padding: 12px; margin-top: 12px;">
      <div class="label" style="margin-bottom: 8px;">📥 导入数据</div>
      <div style="background: #fff8e1; border-radius: 8px; padding: 12px; text-align: center; border: 1px dashed #ffa000;">
        <div style="font-size: 13px; color: #e65100;">选择之前导出的 ZIP 文件恢复数据</div>
        <button class="mock-button" style="width: 100%; background: #FF9800; color: white; padding: 10px; border: none; border-radius: 8px; font-size: 14px; margin-top: 8px;">📂 选择文件导入</button>
      </div>
    </div>

  </div>
</div>
